name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Light deps only — the test suite runs in STUB mode, so torch/sam2/transformers
      # (the heavy, slow installs) are not needed to validate the async API + observability.
      - name: Install test deps
        run: pip install fastapi "uvicorn[standard]" pydantic python-multipart httpx pillow numpy pytest
      - name: Run tests (stub mode)
        env:
          REEFSCAN_STUB: "1"
        run: pytest backend/tests/ -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
